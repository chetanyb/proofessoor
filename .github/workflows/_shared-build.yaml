name: Reusable build

# Builds the dashboard once (arch-independent) and the binary natively per arch,
# pushes each arch image by digest (no per-arch tags, so nothing accumulates in
# the tag list), and merges the digests into one multi-arch manifest per tag.
on:
  workflow_call:
    inputs:
      ref:
        description: "Exact git ref/SHA to build."
        default: ""
        required: false
        type: string
      tags:
        description: "Final image tags as a JSON array, e.g. '[\"v0.1.0\",\"latest\"]'."
        required: true
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

# Image repo is the `DOCKER_REPOSITORY` repo variable, e.g. "myorg/proofessoor".
permissions:
  contents: read

jobs:
  # Build the dashboard once and share it.
  frontend:
    name: Build dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.10"
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: frontend/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - name: Build
        working-directory: frontend
        run: |
          bun install --frozen-lockfile
          bun run build
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dashboard
          path: frontend/dist

  build:
    name: Build ${{ matrix.arch }} image
    needs: frontend
    strategy:
      matrix:
        include:
          - { runner: ubuntu-latest, arch: amd64 }
          - { runner: ubuntu-24.04-arm, arch: arm64 }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref }}

      # Binary, native (toolchain pinned by rust-toolchain.toml). Default ISA.
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.arch }}
      - name: Build binary
        run: cargo build --release --locked

      # Stage the prebuilt binary + the shared dashboard into a clean, tiny build
      # context so the stub's COPYs work (the repo .dockerignore excludes both).
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dashboard
          path: ctx/dist
      - name: Stage binary
        run: cp target/release/proofessoor ctx/proofessoor

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Push by digest only — no per-arch tag is created, so the tag list stays
      # clean. The manifest job stitches these digests into the final tags.
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ctx
          file: Dockerfile.release
          platforms: linux/${{ matrix.arch }}
          outputs: type=image,name=${{ vars.DOCKER_REPOSITORY }},push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: digest-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  manifest:
    name: Merge multi-arch manifest
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digest-*
          merge-multiple: true
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Create and push manifest
        working-directory: ${{ runner.temp }}/digests
        env:
          IMAGE: ${{ vars.DOCKER_REPOSITORY }}
          TAGS: ${{ inputs.tags }}
        run: |
          tag_args=$(echo "$TAGS" | jq -r --arg img "$IMAGE" '.[] | "-t " + $img + ":" + .')
          # Intentional word-splitting: one -t per tag, one ref per digest file.
          # shellcheck disable=SC2086,SC2046
          docker buildx imagetools create $tag_args \
            $(printf "${IMAGE}@sha256:%s " *)
      - name: Inspect
        env:
          IMAGE: ${{ vars.DOCKER_REPOSITORY }}
          TAGS: ${{ inputs.tags }}
        run: |
          first=$(echo "$TAGS" | jq -r '.[0]')
          docker buildx imagetools inspect "${IMAGE}:${first}"
