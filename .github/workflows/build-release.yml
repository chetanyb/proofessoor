name: Build Release

# Cut a release by bumping Cargo.toml then pushing a matching tag:
#   git tag v0.1.0 && git push origin v0.1.0
# The tag must match Cargo.toml's version (the source of truth) or this fails.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.v.outputs.tags }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - id: v
        run: |
          cargo_version=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$cargo_version" != "$tag_version" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match Cargo.toml version $cargo_version"
            exit 1
          fi
          # Only advance `latest` when the tagged commit's tree matches main, so
          # a back-release can't move it.
          git fetch origin main
          if [ "$(git rev-parse 'HEAD^{tree}')" = "$(git rev-parse 'FETCH_HEAD^{tree}')" ]; then
            echo "tags=[\"v$cargo_version\",\"latest\"]" >> "$GITHUB_OUTPUT"
          else
            echo "tags=[\"v$cargo_version\"]" >> "$GITHUB_OUTPUT"
          fi

  # Full CI suite (fmt, clippy, test, cargo-deny, frontend, zizmor) as a release
  # gate; a failing check blocks the promote and release.
  checks:
    uses: ./.github/workflows/ci.yml

  # Reuse the image Build Master already built for this commit instead of
  # recompiling. Build Master compiles cache-free via the shared build, so its
  # multi-arch manifest is a clean artifact — retag it for the release and the
  # release ships the exact bits already built from main, with no second compile.
  promote:
    needs: [prepare, checks]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read # read the Build Master run and download its digest artifact
    steps:
      - name: Wait for the Build Master image of this commit
        id: master
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          # Build Master builds every push to main, including this release commit.
          # Poll its run for this exact SHA until it finishes, then take its digest.
          found=""
          for _ in $(seq 1 80); do # ~40 min ceiling at 30s
            run_id=$(gh api "repos/$REPO/actions/workflows/build-master.yml/runs?head_sha=$SHA&per_page=1" \
              --jq '.workflow_runs[0].id // empty')
            if [ -n "$run_id" ]; then
              status=$(gh api "repos/$REPO/actions/runs/$run_id" --jq '.status')
              if [ "$status" = "completed" ]; then
                conclusion=$(gh api "repos/$REPO/actions/runs/$run_id" --jq '.conclusion // ""')
                if [ "$conclusion" != "success" ]; then
                  echo "::error::Build Master run $run_id concluded '$conclusion'"
                  exit 1
                fi
                echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
                found=1
                break
              fi
            fi
            echo "waiting for Build Master of $SHA (run ${run_id:-pending})…"
            sleep 30
          done
          if [ -z "$found" ]; then
            echo "::error::timed out waiting for the Build Master image of $SHA"
            exit 1
          fi
      - name: Download the built manifest digest
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ steps.master.outputs.run_id }}
        run: gh run download "$RUN_ID" --repo "$REPO" -n manifest-digest -D digest
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Retag the existing digest as the release
        env:
          IMAGE: ${{ vars.DOCKER_REPOSITORY }}
          TAGS: ${{ needs.prepare.outputs.tags }}
        run: |
          digest=$(cat digest/digest.txt)
          tag_args=$(echo "$TAGS" | jq -r --arg img "$IMAGE" '.[] | "-t " + $img + ":" + .')
          # Word-splitting is intentional: one -t per tag.
          # shellcheck disable=SC2086
          docker buildx imagetools create $tag_args "${IMAGE}@${digest}"
          first=$(echo "$TAGS" | jq -r '.[0]')
          docker buildx imagetools inspect "${IMAGE}:${first}"

  release:
    needs: [prepare, promote]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TAG" --generate-notes
