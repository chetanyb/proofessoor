# cargo-deny configuration, enforced in CI (.github/workflows/ci.yml).
# Covers security advisories, allowed licenses, and crate sources.

[advisories]
yanked = "deny"
# paste (RUSTSEC-2024-0436) is unmaintained — a transitive proc-macro helper with
# no drop-in replacement and no security impact. Acknowledged; not a vulnerability.
ignore = ["RUSTSEC-2024-0436"]

[licenses]
# SPDX identifiers actually present in the dependency tree. Permissive licenses
# plus the weak-copyleft MPL-2.0 (file-level, used by rpds/archery).
allow = [
  "MIT",
  "MIT-0",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "ISC",
  "MPL-2.0",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
]

# Lighthouse's internal crates are pulled via git and carry no license metadata,
# but the project is Apache-2.0. Clarify them so the license check can resolve.
[[licenses.clarify]]
crate = "bls"
expression = "Apache-2.0"
license-files = []

[[licenses.clarify]]
crate = "eth2_interop_keypairs"
expression = "Apache-2.0"
license-files = []

[[licenses.clarify]]
crate = "fixed_bytes"
expression = "Apache-2.0"
license-files = []

[[licenses.clarify]]
crate = "int_to_bytes"
expression = "Apache-2.0"
license-files = []

[[licenses.clarify]]
crate = "kzg"
expression = "Apache-2.0"
license-files = []

[[licenses.clarify]]
crate = "merkle_proof"
expression = "Apache-2.0"
license-files = []

[[licenses.clarify]]
crate = "swap_or_not_shuffle"
expression = "Apache-2.0"
license-files = []

[[licenses.clarify]]
crate = "test_random_derive"
expression = "Apache-2.0"
license-files = []

[[licenses.clarify]]
crate = "types"
expression = "Apache-2.0"
license-files = []

[bans]
multiple-versions = "allow"

[sources]
unknown-registry = "deny"
# Git crates are allowed only from the orgs we actually depend on — sigp
# (lighthouse) and eth-act (zkboost and its ere dependency). Any other git
# source fails the check.
unknown-git = "deny"

[sources.allow-org]
github = ["eth-act", "sigp"]
