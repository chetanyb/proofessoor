# proofessoor + zkboost + ere — real ZisK proving on a single multi-GPU box.
#
# One proof type (reth-zisk) across 4 GPUs = ONE ere-server handed devices 0-3.
# That's the single-machine, multi-GPU pattern (a `cluster` backend is for
# distributed/multi-machine proving, not this).
#
# Prerequisites:
#   - NVIDIA drivers + NVIDIA Container Toolkit (Docker `--gpus` / device reservations)
#   - An EL RPC that serves debug_executionWitnessByBlockHash for the blocks you
#     prove (e.g. a hoodi reth supernode). Set el_endpoint in zkboost.toml.
#
# Run (published proofessoor image):
#   docker compose up -d
# Run (build proofessoor from source):
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up -d
#
#   open http://localhost:19100          # proofessoor dashboard
#   open http://localhost:3000/dashboard # zkboost built-in dashboard

name: proofessoor-gpu

services:
  # Real ZisK prover. ERE_ZISK_SETUP_ON_INIT precomputes the proving key on boot
  # (slow first boot — minutes); the ere-zisk-setup volume persists it so later
  # boots skip it. The healthcheck gates dependents until it's actually listening.
  ere-server-reth-zisk:
    image: ghcr.io/eth-act/ere/ere-server-zisk:0.12.1-cuda
    restart: unless-stopped
    command:
      - --port
      - "3000"
      - --elf-url
      - https://github.com/eth-act/ere-guests/releases/download/v0.12.1/stateless-validator-reth-zisk.elf
      - gpu
    environment:
      RUST_LOG: "info,asm_runner=warn,executor=warn,mem_planner_cpp=warn,proofman=warn,rom_setup=warn,sm_rom=warn,zisk=warn"
      ERE_ZISK_SETUP_ON_INIT: "1"
    shm_size: "32gb"
    ulimits:
      memlock: -1
    volumes:
      - ere-zisk-setup:/root/.zisk # persist the proving key so restarts skip setup
    healthcheck:
      # ere binds :3000 only after setup completes; gate dependents on that.
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/3000'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 600s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0", "1", "2", "3"] # GPU IDs to reserve; adjust to your hardware
              capabilities: [gpu]

  zkboost:
    image: ghcr.io/eth-act/zkboost/zkboost:0.8.0
    restart: unless-stopped
    command: ["--config", "/config/zkboost.toml"]
    environment:
      RUST_LOG: "info,zkboost=debug"
    volumes:
      - ./zkboost.toml:/config/zkboost.toml:ro
      # If your EL doesn't serve debug_chainConfig (e.g. a public RPC), generate a
      # chain config (see README) and uncomment to load it:
      # - ./hoodi_chain_config.json:/config/hoodi_chain_config.json:ro
    ports:
      - "3000:3000" # zkboost API + /dashboard
    depends_on:
      ere-server-reth-zisk:
        condition: service_healthy

  proofessoor:
    # Published image by default; docker-compose.local.yml swaps this for a
    # from-source build. Pin a version by setting PROOFESSOOR_IMAGE.
    image: ${PROOFESSOOR_IMAGE:-docker.io/chethack/proofessoor:latest}
    restart: unless-stopped
    environment:
      # proofessoor reads the beacon endpoint from this env var (set it in .env).
      PROOFESSOOR_BEACON_URL: ${BEACON_URL:?set BEACON_URL in .env to your beacon API}
      # For an authenticated beacon, also set a header (uncomment + set BEACON_HEADER):
      # PROOFESSOOR_BEACON_HEADER: ${BEACON_HEADER}
    command:
      - stream
      - --zkboost-url
      - http://zkboost:3000
      - --proof-types
      - reth-zisk
      - --verify
      - --state-dir
      - /state
      - --http-addr
      - 0.0.0.0:9100
      - --ui-dir
      - /srv/ui
    volumes:
      - proofessoor-state:/state
    ports:
      - "${PROOFESSOOR_PORT:-19100}:9100" # dashboard host port; override via PROOFESSOOR_PORT if 19100 is taken
    depends_on:
      - zkboost

volumes:
  proofessoor-state:
  ere-zisk-setup:
